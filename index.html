<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#5b4bd6">
<title>Aliança 365</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aliança 365">
<meta name="mobile-web-app-capable" content="yes">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --roxo:#5b4bd6; --roxo2:#6d5ae6; --rosa:#e35d94; --ambr:#c07d1a;
  --verde:#159a5b; --azul:#3b7fe0; --bg:#fafafa; --card:#ffffff;
  --card2:#f5f5f7; --txt:#1d1d20; --sub:#8a8a90; --linha:#ececee;
  --ok:#159a5b; --sombra:0 1px 2px rgba(20,20,40,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--txt);line-height:1.55;overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
#app{max-width:520px;margin:0 auto;min-height:100%;padding-bottom:84px;position:relative;background:var(--bg)}
.hidden{display:none!important}

/* Header */
.top{
  position:sticky;top:0;z-index:20;
  background:rgba(250,250,250,.85);backdrop-filter:saturate(180%) blur(14px);
  padding:18px 20px 16px;border-bottom:1px solid var(--linha);
}
.top .marca{display:flex;align-items:center;gap:7px;font-weight:700;font-size:11px;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase}
.top h1{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.top .streak{
  margin-top:12px;display:inline-flex;align-items:center;gap:6px;
  background:var(--card2);color:var(--txt);padding:5px 12px;border-radius:20px;font-weight:600;font-size:13px;border:1px solid var(--linha);
}
.top .data{font-size:13px;color:var(--sub);margin-top:8px;text-transform:capitalize}

/* Cards */
.wrap{padding:16px}
.card{
  background:var(--card);border:1px solid var(--linha);border-radius:16px;
  padding:18px;margin-bottom:12px;box-shadow:var(--sombra);
}
.card h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:2px;letter-spacing:-.2px}
.card .badge{font-size:11px;color:var(--sub);font-weight:400}
.pilar{position:relative;padding-left:18px}
.pilar:before{content:"";position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:3px;background:var(--roxo2)}
.pilar.casal:before{background:var(--rosa)}
.pilar.familia:before{background:var(--ambr)}
.pilar.filhos:before{background:var(--azul)}
.pilar.oracao:before{background:var(--verde)}
.pilar.palavra:before{background:var(--roxo2)}
.pilar.gratidao:before{background:#b18cf0}
.tarefa{font-size:16px;margin:8px 0;font-weight:500;letter-spacing:-.2px}
.verso{font-style:italic;font-size:18px;margin:8px 0;color:#33333a;line-height:1.5}
.ref{font-size:13px;color:var(--roxo);font-weight:600}
.subtxt{color:var(--sub);font-size:13px}

/* Botões */
button,.btn{
  font-family:inherit;cursor:pointer;border:none;border-radius:11px;
  font-weight:600;font-size:14px;transition:.15s;
}
.btn-primary{background:var(--roxo);color:#fff;padding:12px 16px;width:100%;letter-spacing:-.2px}
.btn-primary:hover{background:#4d3fc4}
.btn-primary:active{transform:scale(.985)}
.btn-primary:disabled{opacity:.55;cursor:default}
.btn-ok{background:var(--verde);color:#fff;padding:9px 14px}
.btn-ghost{background:var(--card);color:var(--txt);padding:10px 14px;border:1px solid var(--linha)}
.btn-ghost:hover{background:var(--card2)}
.btn-mini{background:var(--card2);color:var(--txt);padding:7px 11px;font-size:12px;border:1px solid var(--linha)}
.done{opacity:.5}
.check{display:inline-flex;width:24px;height:24px;border-radius:50%;border:1.5px solid #d0d0d4;align-items:center;justify-content:center;margin-right:10px;font-size:13px;flex:0 0 auto;transition:.15s}
.check.on{background:var(--verde);border-color:var(--verde);color:#fff}
.linha-tarefa{display:flex;align-items:flex-start;cursor:pointer;padding:4px 0}

/* Inputs */
input,textarea,select{
  font-family:inherit;font-size:15px;width:100%;padding:11px 13px;border-radius:11px;
  background:var(--card);border:1px solid var(--linha);color:var(--txt);margin-top:6px;transition:.15s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--roxo2);box-shadow:0 0 0 3px rgba(109,90,230,.12)}
textarea{resize:vertical;min-height:70px}
label{font-size:13px;color:var(--sub);font-weight:500}
.row{display:flex;gap:8px}
.row>*{flex:1}

/* Nav inferior */
.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(14px);border-top:1px solid var(--linha);
  display:flex;justify-content:space-around;padding:8px 4px 10px;z-index:30;
}
.nav button{background:none;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:500;flex:1;padding:4px}
.nav button .ic{font-size:20px;opacity:.7;transition:.15s}
.nav button.on{color:var(--roxo)}
.nav button.on .ic{opacity:1}

/* Membros / chips */
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--linha);padding:6px 11px;border-radius:20px;font-size:13px;margin:4px 4px 0 0}
.chip .x{color:var(--rosa);font-weight:700;cursor:pointer}

/* Conquistas */
.conq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.conq{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:14px;text-align:center;position:relative}
.conq.locked{opacity:.45;filter:grayscale(1)}
.conq .emoji{font-size:28px}
.conq .nome{font-size:12px;font-weight:600;margin-top:6px}
.conq .prog{font-size:11px;color:var(--sub);margin-top:4px}
.barra{height:5px;background:var(--linha);border-radius:5px;margin-top:6px;overflow:hidden}
.barra>span{display:block;height:100%;background:var(--roxo);border-radius:5px}

/* Timeline */
.tl-item{display:flex;gap:12px;padding:2px 0}
.tl-linha{display:flex;flex-direction:column;align-items:center}
.tl-dot{width:11px;height:11px;border-radius:50%;background:var(--roxo);margin-top:8px;flex:0 0 auto;border:2px solid var(--card);box-shadow:0 0 0 1px var(--roxo2)}
.tl-bar{width:2px;flex:1;background:var(--linha);margin:4px 0}
.tl-conteudo{background:var(--card);border:1px solid var(--linha);border-radius:12px;padding:12px 14px;margin-bottom:10px;flex:1}
.tl-data{font-size:11px;color:var(--sub)}
.tl-foto{width:100%;border-radius:10px;margin-top:8px;max-height:220px;object-fit:cover}

/* Diário entradas */
.diario-e{background:var(--card);border:1px solid var(--linha);border-radius:12px;padding:12px 14px;margin-top:8px}
.diario-e .quem{font-size:12px;font-weight:700;color:var(--roxo)}
.diario-e .data{font-size:11px;color:var(--sub);float:right}

/* IA */
.ia-resp{background:var(--card2);border:1px solid var(--linha);border-radius:14px;padding:16px;margin-top:12px}
.ia-bloco{margin:12px 0}
.ia-bloco:first-child{margin-top:0}
.ia-bloco .rot{font-size:11px;font-weight:700;color:var(--roxo);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}

/* Desafios */
.desafio{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:14px;margin-bottom:10px}
.desafio.ativo{border-color:var(--ambr);box-shadow:0 0 0 1px var(--ambr)}

/* Onboarding */
#onb{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:34px 20px 40px}
#onb .logo{text-align:center;font-size:52px;margin:16px 0 6px}
#onb h1{text-align:center;font-size:28px;font-weight:700;color:var(--roxo);letter-spacing:-.5px}
#onb p.sub{text-align:center;color:var(--sub);margin:8px 0 26px;max-width:340px;margin-left:auto;margin-right:auto}
.passo{max-width:440px;margin:0 auto}
.mini{background:var(--card);border:1px solid var(--linha);border-radius:14px;padding:14px;margin-top:10px}
.toast{position:fixed;bottom:94px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;padding:11px 20px;border-radius:24px;font-weight:600;font-size:14px;z-index:200;box-shadow:0 6px 24px rgba(0,0,0,.18);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.sec-titulo{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);font-weight:700;margin:14px 4px 4px}

/* Livro / retrospectiva */
#livro{background:#faf8f4;color:#2a2233;padding:14px}
@media print{
  body{background:#fff}
  .nav,.top,.no-print{display:none!important}
  #app{padding:0;max-width:100%}
  #livro{padding:0}
  .livro-pag{page-break-after:always;box-shadow:none;border:none}
}
.livro-pag{background:#fff;color:#2a2233;border-radius:14px;padding:26px 22px;margin-bottom:14px;box-shadow:var(--sombra)}
.livro-pag h2{color:var(--roxo);border-bottom:2px solid var(--rosa);padding-bottom:6px}
.livro-pag .cap{font-size:12px;letter-spacing:2px;color:var(--rosa);font-weight:800;text-transform:uppercase}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onb">
  <div class="logo">🕊️</div>
  <h1>Aliança 365</h1>
  <p class="sub">O app que fortalece Casal, Filhos e Família através de Deus.</p>
  <div class="passo" id="onb-passo"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="top">
    <div class="marca">🕊️ ALIANÇA 365</div>
    <h1 id="hdr-familia">❤️ Família</h1>
    <div class="data" id="hdr-data"></div>
    <div class="streak">🔥 Sequência: <span id="hdr-streak">0</span> dias</div>
  </header>

  <!-- HOJE -->
  <section id="tab-hoje" class="wrap"></section>
  <!-- DIÁRIO -->
  <section id="tab-diario" class="wrap hidden"></section>
  <!-- LINHA DO TEMPO -->
  <section id="tab-timeline" class="wrap hidden"></section>
  <!-- IA -->
  <section id="tab-ia" class="wrap hidden"></section>
  <!-- MAIS (desafios, conquistas, livro, config) -->
  <section id="tab-mais" class="wrap hidden"></section>

  <nav class="nav">
    <button data-tab="hoje" class="on"><span class="ic">🏠</span>Hoje</button>
    <button data-tab="diario"><span class="ic">📖</span>Diário</button>
    <button data-tab="timeline"><span class="ic">📅</span>Linha</button>
    <button data-tab="ia"><span class="ic">✨</span>IA</button>
    <button data-tab="mais"><span class="ic">⚙️</span>Mais</button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ ESTADO ============ */
const LS="alianca365";
let S=load();
function load(){
  try{return JSON.parse(localStorage.getItem(LS))||null}catch(e){return null}
}
function save(){
  try{localStorage.setItem(LS,JSON.stringify(S))}
  catch(e){
    // cota do aparelho cheia (muitas fotos base64). Avisa em vez de perder em silêncio.
    try{toast("⚠️ Memória do aparelho cheia. Sincronize e evite novas fotos aqui.")}catch(_){}
    console.warn("save falhou:",e);
  }
}
function novoEstado(){
  return{
    familia:"", conjuges:["",""], filhos:[],
    criado:hoje(), streak:0, ultimoDia:null,
    feito:{}, // {data:{casal:bool,familia:bool,filhos:bool,oracao:bool,palavra:bool,gratidao:bool}}
    diario:[], timeline:[], gratidao:[],
    contadores:{oracoes:0,leituras:0,jantares:0,jogos:0,memorias:0,oracaoRespondida:0},
    desafioAtivo:null, desafiosFeitos:[],
    conquistas:[],
    geminiKey:"", geminiModel:"gemini-2.5-flash", retroTexto:"",
    driveClientId:"", driveFolderId:"", driveEmail:"", driveAuto:false, driveUltimo:""
  };
}
/* migração p/ estados antigos sem campos novos */
function migrar(){
  if(S.geminiKey===undefined)S.geminiKey="";
  if(S.geminiModel===undefined)S.geminiModel="gemini-2.5-flash";
  if(S.retroTexto===undefined)S.retroTexto="";
  if(S.driveClientId===undefined)S.driveClientId="";
  if(S.driveFolderId===undefined)S.driveFolderId="";
  if(S.driveEmail===undefined)S.driveEmail="";
  if(S.driveAuto===undefined)S.driveAuto=false;
  if(S.driveUltimo===undefined)S.driveUltimo="";
  // ids estáveis p/ sincronizar entre aparelhos sem duplicar/perder
  ["diario","timeline","gratidao"].forEach(k=>{
    (S[k]||[]).forEach(r=>{if(r&&!r.id)r.id=uid()});
  });
}

/* ============ UTIL ============ */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function hoje(){return new Date().toISOString().slice(0,10)}
function dataBonita(d){
  const dt=new Date(d+"T12:00:00");
  return dt.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function diaDoAno(){
  const n=new Date(); const ini=new Date(n.getFullYear(),0,0);
  return Math.floor((n-ini)/86400000);
}
function toast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);
}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function faixaEtaria(i){
  if(i<=5)return"pequeno"; if(i<=9)return"crianca"; if(i<=12)return"pre"; return"adolescente";
}

/* ============ CONTEÚDO DIÁRIO (rotativo por dia do ano) ============ */
const C_CASAL=[
 "Façam um elogio sincero um ao outro.","Escrevam um bilhete de amor.",
 "Orem de mãos dadas por 2 minutos.","Relembrem como se conheceram.",
 "Digam 3 qualidades que admiram no outro.","Planejem um encontro esta semana.",
 "Perdoem algo pequeno e sigam em frente.","Agradeçam a Deus pelo casamento.",
 "Sonhem juntos: onde querem estar em 5 anos?","Deem um abraço de 20 segundos.",
 "Leiam 1 Coríntios 13 juntos.","Contem um momento em que se sentiram amados."
];
const C_FAMILIA=[
 "Jantem juntos sem celular.","Façam um piquenique na sala.",
 "Assistam a um filme em família.","Joguem um jogo de tabuleiro.",
 "Façam um passeio ao ar livre.","Cozinhem algo juntos.",
 "Contem histórias da infância dos pais.","Façam uma noite sem telas.",
 "Cada um diz do que é grato hoje.","Dancem uma música juntos na sala.",
 "Organizem um cantinho da casa em equipe.","Façam uma caminhada e orem pelo bairro."
];
const C_ORACAO=[
 "Orem por 3 minutos, cada um em voz alta.","Orem por uma família amiga.",
 "Agradeçam por 3 bênçãos de hoje.","Orem pela escola e trabalho.",
 "Peçam sabedoria a Deus para a semana.","Orem por quem está doente.",
 "Louvem a Deus por Sua fidelidade.","Orem pelos sonhos de cada um."
];
const PALAVRA=[
 ["Josué 24:15","Eu e minha casa serviremos ao Senhor."],
 ["Provérbios 3:5","Confie no Senhor de todo o coração."],
 ["Salmos 127:1","Se o Senhor não edificar a casa, em vão trabalham os construtores."],
 ["1 Coríntios 13:4","O amor é paciente, o amor é bondoso."],
 ["Filipenses 4:6","Não andem ansiosos por coisa alguma."],
 ["Deuteronômio 6:7","Ensina-as a teus filhos."],
 ["Salmos 133:1","Como é bom viverem unidos os irmãos!"],
 ["Efésios 4:32","Sejam bondosos e compassivos uns com os outros."],
 ["Mateus 6:33","Busquem em primeiro lugar o Reino de Deus."],
 ["Salmos 23:1","O Senhor é o meu pastor, nada me faltará."],
 ["Provérbios 22:6","Ensina a criança no caminho em que deve andar."],
 ["Colossenses 3:14","Sobre tudo isto, porém, revistam-se do amor."]
];

/* Atividade por filho conforme idade */
function atividadeFilho(f){
  const g=faixaEtaria(f.idade); const d=diaDoAno();
  const bank={
    pequeno:[
      {h:"Conte a história de Noé e a arca.",p:"O que Deus ensinou para Noé?"},
      {h:"Conte a história de Davi e Golias.",p:"Deus é maior que nossos medos?"},
      {h:"Cante uma música cristã infantil juntos.",p:"Você sente o amor de Deus?"},
      {h:"Conte como Jesus acalmou a tempestade.",p:"A quem pedimos ajuda quando temos medo?"},
      {h:"Desenhem juntos a criação do mundo.",p:"O que Deus fez que você mais gosta?"}
    ],
    crianca:[
      {h:"Leiam a história de José do Egito.",p:"O que aprendemos sobre perdoar?"},
      {h:"Leia a história de Davi (1 Samuel 17).",p:'O que aprendemos com a coragem de Davi?'},
      {h:"Leiam sobre Daniel na cova dos leões.",p:"Como podemos ser fiéis como Daniel?"},
      {h:"Contem uma parábola de Jesus.",p:"O que Jesus quis nos ensinar?"},
      {h:"Leiam Salmos 23 juntos.",p:"Como Deus cuida de nós?"}
    ],
    pre:[
      {h:"Leiam Provérbios 3 juntos.",p:"O que aprendemos hoje?"},
      {h:"Leiam sobre os frutos do Espírito (Gálatas 5).",p:"Qual fruto você quer desenvolver?"},
      {h:"Estudem o Sermão do Monte (Mateus 5).",p:"O que é ser bem-aventurado?"},
      {h:"Leiam sobre a armadura de Deus (Efésios 6).",p:"Como nos protegemos do mal?"},
      {h:"Leiam a história de Ester.",p:"Como Deus usa pessoas comuns?"}
    ],
    adolescente:[
      {h:"Pergunte qual foi o melhor momento da semana.",p:"Orem por um sonho dele(a)."},
      {h:"Conversem sobre um desafio que ele enfrenta.",p:"O que a fé diz sobre isso?"},
      {h:"Leiam Provérbios sobre amizades.",p:"Como escolher boas companhias?"},
      {h:"Pergunte como ele vê a presença de Deus na vida dele.",p:"Orem juntos por direção."},
      {h:"Conversem sobre propósito e futuro.",p:"Que dons Deus deu a você?"}
    ]
  };
  const arr=bank[g]; return arr[(d+ (f.nome?f.nome.length:0)) % arr.length];
}

/* ============ DESAFIOS SEMANAIS ============ */
const DESAFIOS=[
 {id:"gratidao",nome:"Semana da Gratidão",emoji:"🙏",desc:"Todos escrevem 3 agradecimentos."},
 {id:"perdao",nome:"Semana do Perdão",emoji:"🤝",desc:"Cada um pede desculpas por algo."},
 {id:"generosidade",nome:"Semana da Generosidade",emoji:"🎁",desc:"Façam uma boa ação juntos."},
 {id:"biblia",nome:"Semana da Bíblia",emoji:"📖",desc:"Leitura em família todos os dias."},
 {id:"semtelas",nome:"Semana sem Telas",emoji:"📵",desc:"Uma noite inteira juntos, sem telas."}
];

/* ============ CONQUISTAS ============ */
const CONQUISTAS=[
 {id:"seq30",emoji:"❤️",nome:"30 dias de sequência",meta:30,get:()=>S.streak},
 {id:"or100",emoji:"🙏",nome:"100 orações",meta:100,get:()=>S.contadores.oracoes},
 {id:"le50",emoji:"📖",nome:"50 leituras",meta:50,get:()=>S.contadores.leituras},
 {id:"jan20",emoji:"👨‍👩‍👧",nome:"20 jantares juntos",meta:20,get:()=>S.contadores.jantares},
 {id:"jog10",emoji:"🎮",nome:"10 noites de jogos",meta:10,get:()=>S.contadores.jogos},
 {id:"mem100",emoji:"📷",nome:"100 memórias",meta:100,get:()=>S.contadores.memorias},
 {id:"orResp",emoji:"⭐",nome:"1ª oração respondida",meta:1,get:()=>S.contadores.oracaoRespondida},
 {id:"mes",emoji:"🏆",nome:"Família do Mês",meta:100,get:()=>Math.min(S.streak,100)}
];

/* ============ ONBOARDING ============ */
let onbFilhos=[];
function renderOnb(){
  const el=document.getElementById("onb-passo");
  el.innerHTML=`
    <div class="mini">
      <label>Sobrenome da família</label>
      <input id="ob-fam" placeholder="Ex: Oliveira" value="${esc(S?S.familia:'')}">
    </div>
    <div class="mini">
      <div class="sec-titulo">💍 O casal (centro de tudo)</div>
      <label>Nome</label><input id="ob-c1" placeholder="Ex: João">
      <label style="margin-top:8px;display:block">Nome</label><input id="ob-c2" placeholder="Ex: Maria">
    </div>
    <div class="mini">
      <div class="sec-titulo">👦 Filhos (opcional)</div>
      <p class="subtxt">O app adapta as atividades pela idade de cada um.</p>
      <div id="ob-filhos"></div>
      <div class="row" style="margin-top:8px">
        <input id="ob-fn" placeholder="Nome do filho">
        <input id="ob-fi" type="number" min="0" max="19" placeholder="Idade" style="max-width:90px">
      </div>
      <button class="btn-ghost" style="margin-top:8px;width:100%" onclick="addFilhoOnb()">+ Adicionar filho</button>
    </div>

/* ============ SEQUÊNCIA ============ */
function registrarDia(){
  const h=hoje();
  if(S.ultimoDia===h)return;
  const ontem=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(S.ultimoDia===ontem)S.streak++;
  else S.streak=1;
  S.ultimoDia=h;save();
}

/* ============ MEMBROS ============ */
function todosMembros(){
  return [...S.conjuges.filter(Boolean),...S.filhos.map(f=>f.nome)];
}

/* ============ TAREFAS DO DIA ============ */
function feitoHoje(){
  const h=hoje();
  if(!S.feito[h])S.feito[h]={};
  return S.feito[h];
}
function marcar(tipo){
  const f=feitoHoje();
  f[tipo]=!f[tipo];
  if(f[tipo]){
    if(tipo==="oracao")S.contadores.oracoes++;
    if(tipo==="palavra")S.contadores.leituras++;
    if(tipo==="familia")S.contadores.jantares++;
    toast("Registrado! 🌟");
    checarConquistas();
  }else{
    if(tipo==="oracao")S.contadores.oracoes=Math.max(0,S.contadores.oracoes-1);
    if(tipo==="palavra")S.contadores.leituras=Math.max(0,S.contadores.leituras-1);
    if(tipo==="familia")S.contadores.jantares=Math.max(0,S.contadores.jantares-1);
  }
  save();renderHoje();
}
function checarConquistas(){
  CONQUISTAS.forEach(c=>{
    if(c.get()>=c.meta && !S.conquistas.includes(c.id)){
      S.conquistas.push(c.id);save();
      toast(c.emoji+" Conquista: "+c.nome+"!");
    }
  });
}

let fotoTmp=null;
function prevFoto(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    // reduz tamanho p/ caber no localStorage
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement("canvas");
      const max=900;let{width:w,height:h}=img;
      if(w>max){h=h*max/w;w=max}
      cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
      fotoTmp=cv.toDataURL("image/jpeg",0.7);
      const p=document.getElementById("tl-prev");p.src=fotoTmp;p.classList.remove("hidden");
    };img.src=e.target.result;
  };r.readAsDataURL(f);
}

  S.timeline.push({id:uid(),titulo,data,desc,tipo,quem,foto:fotoTmp});
  if(fotoTmp)S.contadores.memorias++;
  if(tipo==="oracao")S.contadores.oracaoRespondida++;
  fotoTmp=null;save();checarConquistas();
  toast("Momento registrado! ⭐");renderTimeline();autoBackup();
}

function iaResponder(txt){
  const t=txt.toLowerCase();
  let regra=IA_REGRAS.find(r=>r.k.some(k=>t.includes(k)));
  // detecta idade citada
  let idadeCit=(t.match(/(\d{1,2})\s*anos?/)||[])[1];
  let faixa="crianca";
  if(idadeCit)faixa=faixaEtaria(parseInt(idadeCit));
  else if(t.includes("adolescen"))faixa="adolescente";
  else if(t.includes("bebê")||t.includes("pequen"))faixa="pequeno";
  if(!regra){
    regra={vers:["Provérbios 3:5-6","Confie no Senhor de todo o coração e Ele endireitará as suas veredas."],
      ora:"Senhor, guia nossa família nesse momento com Tua sabedoria e amor. Amém.",
      conv:{pequeno:"Fale com carinho e ouça o coração dele(a).",crianca:"Converse com paciência e ouça.",pre:"Dialogue com respeito e abertura.",adolescente:"Ouça de verdade antes de aconselhar."},
      ativ:"Reservem um tempo juntos para conversar e orar sobre isso."};
  }
  const conv=regra.conv[faixa]||regra.conv.crianca;
  return blocoIA({referencia:regra.vers[0],versiculo:regra.vers[1],oracao:regra.ora,
    comoConversar:conv,atividade:regra.ativ},
    idadeCit?`${idadeCit} anos`:faixa,true);
}

          faixa:{type:"STRING",description:"Idade ou faixa etária alvo, ex: 8 anos"}
        },
        required:["referencia","versiculo","oracao","comoConversar","atividade"]
      }
    },
    safetySettings:[
      {category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_ONLY_HIGH"},
      {category:"HARM_CATEGORY_DANGEROUS_CONTENT",threshold:"BLOCK_ONLY_HIGH"}
    ]
  };
  const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!resp.ok){
    let msg="";try{msg=(await resp.json())?.error?.message||""}catch(e){}
    if(resp.status===400&&/API key/i.test(msg))throw new Error("CHAVE_INVALIDA");
    if(resp.status===429)throw new Error("LIMITE");
    throw new Error("HTTP "+resp.status+(msg?": "+msg:""));
  }
  const data=await resp.json();
  const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!raw)throw new Error("Resposta vazia da IA.");
  const r=JSON.parse(raw);
  return blocoIA(r,r.faixa||"",false);
}

/* ============ GOOGLE DRIVE ============ */
const DRIVE_SCOPE="https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email";
let driveTok=null, driveTokExp=0, tokClient=null, tokResolve=null, tokReject=null;
function initTok(){
  if(!(window.google&&google.accounts&&google.accounts.oauth2))
    throw new Error("SDK do Google ainda carregando — aguarde 2s e tente de novo.");
  tokClient=google.accounts.oauth2.initTokenClient({
    client_id:(S.driveClientId||"").trim(),
    scope:DRIVE_SCOPE,
    callback:r=>{
      if(r.error){tokReject&&tokReject(new Error(r.error));return}
      driveTok=r.access_token;driveTokExp=Date.now()+((r.expires_in||3600)*1000)-60000;
      tokResolve&&tokResolve(driveTok);
    }
  });
  return tokClient;
}
function getToken(interactive){
  return new Promise((res,rej)=>{
    if(driveTok&&Date.now()<driveTokExp){res(driveTok);return}
    if(!(S.driveClientId||"").trim()){rej(new Error("Configure o OAuth Client ID primeiro."));return}
    if(!tokClient)initTok();
    tokResolve=res;tokReject=rej;
    tokClient.requestAccessToken({prompt:interactive?"consent":""});
  });
}
async function driveFetch(url,opts={}){
  const t=await getToken(false);
  opts.headers=Object.assign({},opts.headers,{Authorization:"Bearer "+t});
  let r=await fetch(url,opts);
  if(r.status===401){
    driveTok=null;const t2=await getToken(true);
    opts.headers.Authorization="Bearer "+t2;r=await fetch(url,opts);
  }
  return r;
}
async function driveFolder(){
  if(S.driveFolderId){
    const r=await driveFetch("https://www.googleapis.com/drive/v3/files/"+S.driveFolderId+"?fields=id,trashed");
    if(r.ok){const d=await r.json();if(!d.trashed)return S.driveFolderId}
  }
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='Aliança 365' and trashed=false");
  const rs=await driveFetch("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id)&spaces=drive");
  const ds=await rs.json();
  if(ds.files&&ds.files.length){S.driveFolderId=ds.files[0].id;save();return S.driveFolderId}
  const rc=await driveFetch("https://www.googleapis.com/drive/v3/files",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:"Aliança 365",mimeType:"application/vnd.google-apps.folder"})});
  const dc=await rc.json();S.driveFolderId=dc.id;save();return dc.id;
}
async function driveFind(name,folder){
  const q=encodeURIComponent("name='"+name.replace(/'/g,"\\'")+"' and '"+folder+"' in parents and trashed=false");
  const r=await driveFetch("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id)");
  const d=await r.json();return (d.files&&d.files[0])?d.files[0].id:null;
}
async function driveMultipart(meta,mime,data,isB64){
  const bd="a365"+Math.random().toString(36).slice(2);
  const dl="\r\n--"+bd+"\r\n";
  const body=dl+"Content-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+
    dl+"Content-Type: "+mime+"\r\n"+(isB64?"Content-Transfer-Encoding: base64\r\n":"")+"\r\n"+data+
    "\r\n--"+bd+"--";
  const r=await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{
    method:"POST",headers:{"Content-Type":"multipart/related; boundary="+bd},body});
  const d=await r.json();return d.id;
}
async function driveUploadJSON(name,obj,folder){
  const id=await driveFind(name,folder);
  const body=JSON.stringify(obj);
  if(id){
    await driveFetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",{
      method:"PATCH",headers:{"Content-Type":"application/json"},body});
    return id;
  }
  return driveMultipart({name,parents:[folder],mimeType:"application/json"},"application/json",body,false);
}
async function driveUploadFoto(name,dataUrl,folder){
  const mime=dataUrl.slice(5,dataUrl.indexOf(";"));
  const b64=dataUrl.split(",")[1];
  return driveMultipart({name,parents:[folder]},mime,b64,true);
}

function backupObj(){

/* ---- Motor de sincronização (une aparelhos sem perder registro) ---- */
function recalcDerivados(st){
  // contadores derivam do dado-base -> recalcula p/ não contar em dobro no merge
  const c={oracoes:0,leituras:0,jantares:0,jogos:(st.contadores&&st.contadores.jogos)||0,memorias:0,oracaoRespondida:0};
  for(const d in (st.feito||{})){const f=st.feito[d]||{};
    if(f.oracao)c.oracoes++; if(f.palavra)c.leituras++; if(f.familia)c.jantares++;}
  for(const t of (st.timeline||[])){if(t.foto)c.memorias++; if(t.tipo==="oracao")c.oracaoRespondida++;}
  st.contadores=c;
  // streak = maior sequência de dias ativos terminando no último dia registrado
  const dias=Object.keys(st.feito||{}).filter(k=>Object.values(st.feito[k]||{}).some(Boolean)).sort();
  if(!dias.length){st.streak=0;st.ultimoDia=null;}
  else{
    const set=new Set(dias),last=dias[dias.length-1];
    let n=0,cur=new Date(last+"T12:00:00");
    while(set.has(cur.toISOString().slice(0,10))){n++;cur=new Date(cur.getTime()-86400000);}
    st.streak=n;st.ultimoDia=last;
  }
}
function unirLista(a,b){
  const map=new Map();
  [...(a||[]),...(b||[])].forEach(r=>{
    if(!r)return; if(!r.id)r.id=uid();
    const ex=map.get(r.id);
    // se o mesmo id existir sem foto de um lado e com foto do outro, mantém a foto
    if(!ex)map.set(r.id,r);
    else if(!ex.foto&&r.foto)map.set(r.id,r);
  });
  return [...map.values()].sort((x,y)=>((x.data||"")<(y.data||"")?-1:1));
}
function mergeInto(remote){
  if(!remote||typeof remote!=="object")return;
  // config: mantém a deste aparelho, completa buracos com o remoto
  S.familia=S.familia||remote.familia||"";
  if(!(S.conjuges&&S.conjuges.some(Boolean))&&remote.conjuges)S.conjuges=remote.conjuges;
  const nomes=new Set((S.filhos||[]).map(f=>f.nome));
  (remote.filhos||[]).forEach(f=>{if(f&&!nomes.has(f.nome)){S.filhos.push(f);nomes.add(f.nome)}});
  if(remote.criado&&(!S.criado||remote.criado<S.criado))S.criado=remote.criado;
  // feito: união por data/tarefa (true vence)
  S.feito=S.feito||{};
  for(const d in (remote.feito||{})){
    S.feito[d]=S.feito[d]||{};
    const rf=remote.feito[d]||{};
    for(const t in rf)if(rf[t])S.feito[d][t]=true;
  }
  // listas de registros: união por id
  S.diario=unirLista(S.diario,remote.diario);
  S.timeline=unirLista(S.timeline,remote.timeline);
  S.gratidao=unirLista(S.gratidao,remote.gratidao);
  // conjuntos
  S.desafiosFeitos=[...new Set([...(S.desafiosFeitos||[]),...(remote.desafiosFeitos||[])])];
  S.conquistas=[...new Set([...(S.conquistas||[]),...(remote.conquistas||[])])];
  if(!S.retroTexto)S.retroTexto=remote.retroTexto||"";
  // recalcula contadores/streak do estado unido e reavalia conquistas
  recalcDerivados(S);
  CONQUISTAS.forEach(c=>{if(c.get()>=c.meta&&!S.conquistas.includes(c.id))S.conquistas.push(c.id)});
  save();
}
async function driveBackup(silent){
  const folder=await driveFolder();
  // 1. puxa o que os outros aparelhos já salvaram e mescla (nada é perdido)
  try{
    const rid=await driveFind("alianca365-backup.json",folder);
    if(rid){
      const rr=await driveFetch("https://www.googleapis.com/drive/v3/files/"+rid+"?alt=media");
      if(rr.ok){const remote=await rr.json();delete remote._app;delete remote._data;mergeInto(remote);}
    }
  }catch(e){}
  // 2. sobe fotos novas da timeline como JPG na pasta
  let novas=0;
  for(const t of S.timeline){
    if(t.foto&&!t.driveId){
      try{t.driveId=await driveUploadFoto("foto-"+(t.data||hoje())+"-"+Math.random().toString(36).slice(2,6)+".jpg",t.foto,folder);novas++}catch(e){}
    }
  }
  // 3. publica o estado unido
  await driveUploadJSON("alianca365-backup.json",backupObj(),folder);
  S.driveUltimo=new Date().toLocaleString("pt-BR");save();
  render();
  if(!silent){dstatus("🟢 Sincronizado! "+novas+" foto(s) nova(s). "+S.driveUltimo);toast("Sincronizado ✓");renderMais();}
  return novas;
}

async function driveRestaurar(){
  if(!confirm("Isso junta (mescla) os registros do Drive com os deste aparelho. Nada é apagado. Continuar?"))return;

}

function exportarArquivo(){

  a.href=url;a.download="alianca365-"+hoje()+".json";

function importarArquivo(input){
  const f=input.files&&input.files[0];if(!f)return;
  if(!confirm("Isso junta (mescla) os registros do arquivo com os deste aparelho. Nada é apagado. Continuar?")){input.value="";return}
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const bk=JSON.parse(rd.result);
      if(bk._app&&bk._app!=="alianca365")throw new Error("não é um backup do Aliança 365");
      delete bk._app;delete bk._data;
      mergeInto(bk);
      render();renderMais();toast("Registros mesclados ✓");
    }catch(e){toast("Arquivo inválido: "+e.message)}
    finally{input.value=""}
  };
  rd.readAsText(f);
}

      <div class="sec-titulo" style="margin-top:12px">👦 Filhos</div>
      <div id="cfg-filhos">${S.filhos.map((f,i)=>`<span class="chip">👦 ${esc(f.nome)} (${f.idade}a) <span class="x" onclick="rmFilho(${i})">✕</span></span>`).join("")||'<span class="subtxt">Nenhum</span>'}</div>
      <div class="row" style="margin-top:8px">
        <input id="cfg-fn" placeholder="Nome do filho">
        <input id="cfg-fi" type="number" min="0" max="19" placeholder="Idade" style="max-width:90px">
      </div>
      <button class="btn-ghost" style="margin-top:8px;width:100%" onclick="addFilho()">+ Adicionar filho</button>
      <button class="btn-primary" style="margin-top:12px" onclick="salvarCfg()">Salvar configurações</button>
      <button class="btn-mini" style="margin-top:10px;width:100%;color:var(--rosa)" onclick="resetar()">Apagar todos os dados</button>
    </div>
    <p class="subtxt" style="text-align:center;padding:10px;font-size:11px">🕊️ Aliança 365 — "Eu e minha casa serviremos ao Senhor."<br>Todos os dados ficam só neste dispositivo.</p>
  `;
}

  i.type=i.type==="password"?"text":"password";
}
function salvarKey(){
  S.geminiKey=document.getElementById("cfg-key").value.trim();
  S.geminiModel=document.getElementById("cfg-model").value;

  document.getElementById("cfg-key-status").innerHTML=S.geminiKey?"🟢 Chave salva. IA ativada!":"🟡 Chave removida — voltou ao modo offline.";

}
async function testarKey(){
  const st=document.getElementById("cfg-key-status");
  S.geminiKey=document.getElementById("cfg-key").value.trim();
  S.geminiModel=document.getElementById("cfg-model").value;save();
  if(!S.geminiKey){st.innerHTML="🟡 Cole uma chave primeiro.";return}
  st.innerHTML="⏳ Testando conexão com o Gemini…";
  try{
    await iaGemini("Meu filho de 7 anos está com medo do escuro.");
    st.innerHTML="🟢 Funcionou! A IA está respondendo corretamente.";
    toast("IA conectada! ✨");
  }catch(e){
    if(e.message==="CHAVE_INVALIDA")st.innerHTML="🔴 Chave inválida. Confira em aistudio.google.com/apikey.";
    else if(e.message==="LIMITE")st.innerHTML="🟠 Limite atingido, mas a chave é válida.";
    else st.innerHTML="🔴 Erro: "+esc(e.message);
  }
}
function ativarDesafio(id){
  if(S.desafioAtivo===id){S.desafioAtivo=null;if(!S.desafiosFeitos.includes(id))S.desafiosFeitos.push(id);toast("Desafio concluído! 🎉")}
  else{S.desafioAtivo=id;toast("Desafio ativado! 💪")}
  save();renderMais();renderHoje();
}
function addFilho(){
  const n=document.getElementById("cfg-fn").value.trim();
  const i=parseInt(document.getElementById("cfg-fi").value);
  if(!n||isNaN(i)){toast("Preencha nome e idade");return}
  S.filhos.push({nome:n,idade:i});save();renderMais();
}
function rmFilho(i){S.filhos.splice(i,1);save();renderMais()}
function salvarCfg(){
  S.familia=document.getElementById("cfg-fam").value.trim()||S.familia;
  S.conjuges=[document.getElementById("cfg-c1").value.trim(),document.getElementById("cfg-c2").value.trim()];
  save();render();toast("Configurações salvas ✓");
}
function resetar(){
  if(confirm("Isso vai apagar TODOS os dados da família neste dispositivo. Tem certeza?")){
    localStorage.removeItem(LS);location.reload();
  }
}

/* ============ LIVRO DA FAMÍLIA ============ */
function retrospectivaIA(){
  const dias=S.streak;
  const nMem=S.timeline.length;const nGrat=S.gratidao.length;const nDia=S.diario.length;
  const fotos=S.timeline.filter(t=>t.foto).length;
  const filhos=S.filhos.map(f=>f.nome).join(", ");
  let t=`A família ${S.familia} caminhou com Deus por ${dias} ${dias===1?'dia':'dias'}. `;
  if(S.conjuges[0]&&S.conjuges[1])t+=`${S.conjuges[0]} e ${S.conjuges[1]} escolheram, dia após dia, colocar o Senhor no centro do lar. `;
  if(filhos)t+=`Junto de ${filhos}, cultivaram fé, amor e presença. `;
  t+=`Ao longo dessa jornada, registraram ${nMem} ${nMem===1?'momento marcante':'momentos marcantes'}, `;
  t+=`${fotos} ${fotos===1?'foto':'fotos'}, ${nGrat} ${nGrat===1?'gratidão':'gratidões'} e ${nDia} ${nDia===1?'reflexão no diário':'reflexões no diário'}. `;
  t+=`Cada oração respondida, cada refeição sem pressa, cada história bíblica contada às crianças, teceu os fios de uma aliança que o tempo não apaga. `;
  t+=`Que os próximos anos sejam ainda mais cheios da presença de Deus. "Eu e minha casa serviremos ao Senhor." (Josué 24:15)`;
  return t;
}
/* resumo compacto da jornada p/ alimentar a IA */
function resumoJornada(){
  const fotos=S.timeline.filter(t=>t.foto).length;
  let r=`${contextoFamilia()}\n`;
  r+=`Dias de sequência: ${S.streak}. Orações: ${S.contadores.oracoes}. Leituras: ${S.contadores.leituras}. `;
  r+=`Jantares juntos: ${S.contadores.jantares}. Memórias/fotos: ${fotos}. Conquistas: ${S.conquistas.length}.\n`;
  if(S.timeline.length)r+=`Momentos marcantes: ${S.timeline.slice(0,12).map(t=>t.titulo).join("; ")}.\n`;
  if(S.gratidao.length)r+=`Exemplos de gratidão: ${S.gratidao.slice(-8).map(g=>`${g.quem}: ${g.txt}`).join(" | ")}.\n`;
  if(S.diario.length)r+=`Trechos do diário: ${S.diario.slice(-6).map(e=>`${e.quem}: ${e.txt}`).join(" | ")}.\n`;
  return r;
}
/* gera a retrospectiva do Livro via Gemini (texto corrido) */
async function iaRetrospectivaGemini(){
  const key=(S.geminiKey||"").trim();
  if(!key)throw new Error("SEM_CHAVE");
  const model=S.geminiModel||"gemini-2.5-flash";
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  const sys=`Você escreve a retrospectiva emocionante do "Livro da Nossa Família" do app cristão Aliança 365.
Escreva em português do Brasil, em 2 a 3 parágrafos (150 a 250 palavras), tom caloroso, poético e cristão, na terceira pessoa, celebrando a jornada da família com Deus.
Use nomes e dados reais fornecidos. Termine com uma bênção curta e uma referência bíblica adequada. Não use listas; texto corrido. Não invente fatos além dos dados.`;
  const body={
    systemInstruction:{parts:[{text:sys}]},
    contents:[{role:"user",parts:[{text:"Dados da família:\n"+resumoJornada()}]}],
    generationConfig:{temperature:0.9}
  };
  const resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!resp.ok){
    let msg="";try{msg=(await resp.json())?.error?.message||""}catch(e){}
    if(resp.status===400&&/API key/i.test(msg))throw new Error("CHAVE_INVALIDA");
    if(resp.status===429)throw new Error("LIMITE");
    throw new Error("HTTP "+resp.status);
  }
  const data=await resp.json();
  const txt=data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
  if(!txt)throw new Error("Resposta vazia.");
  return txt;
}
/* dispara geração e atualiza a página do livro */
async function reescreverRetro(){
  const p=document.getElementById("retro-txt");
  const btn=document.getElementById("retro-btn");
  if(!(S.geminiKey||"").trim()){toast("Adicione a chave Gemini em Configurações");return}
  if(btn){btn.disabled=true;btn.textContent="Escrevendo… ✨"}
  if(p)p.innerHTML='<span class="subtxt">🕊️ A IA está escrevendo a história da sua família…</span>';
  try{
    const t=await iaRetrospectivaGemini();
    S.retroTexto=t;save();
    if(p)p.innerHTML=esc(t).replace(/\n+/g,"<br><br>");
    toast("Retrospectiva gerada! ✨");
  }catch(e){
    if(p)p.innerHTML=esc(retrospectivaIA());
    toast(e.message==="CHAVE_INVALIDA"?"Chave inválida":"IA indisponível — usei texto local");
  }finally{
    if(btn){btn.disabled=false;btn.textContent=S.retroTexto?"✨ Reescrever com IA":"✨ Gerar com IA"}
  }
}
function gerarLivro(){

  const gratsPorMembro={};
  S.gratidao.forEach(g=>{(gratsPorMembro[g.quem]=gratsPorMembro[g.quem]||[]).push(g.txt)});
  livro.innerHTML=`

      <div class="row">
        <button class="btn-primary" onclick="window.print()">🖨️ Salvar como PDF / Imprimir</button>
        <button class="btn-ghost" onclick="fecharLivro()" style="max-width:120px">Voltar</button>
      </div>

    </div>

    <div class="livro-pag" style="text-align:center;padding-top:60px">
      <div style="font-size:60px">🕊️</div>

      <h1 style="color:var(--roxo);font-size:34px;margin:14px 0;border:none">Família ${esc(S.familia)}</h1>

      <p style="margin-top:8px;color:#a99">${new Date().getFullYear()}</p>
      <p style="margin-top:40px;font-style:italic;color:#6d28d9">"Eu e minha casa serviremos ao Senhor."<br>Josué 24:15</p>
    </div>

    <div class="livro-pag">
      <div class="cap">Retrospectiva ${S.retroTexto?"· por IA ✨":""}</div>
      <h2>Nossa Jornada</h2>
      <p id="retro-txt" style="margin-top:12px;font-size:16px;line-height:1.8">${S.retroTexto?esc(S.retroTexto).replace(/\n+/g,"<br><br>"):esc(retrospectivaIA())}</p>
      <button id="retro-btn" class="btn-ghost no-print" style="margin-top:12px;width:100%" onclick="reescreverRetro()">${S.retroTexto?"✨ Reescrever com IA":"✨ Gerar com IA"}</button>
    </div>

    ${S.timeline.filter(t=>t.foto).length?`
    <div class="livro-pag">
      <div class="cap">Memórias em Fotos</div>
      <h2>📸 Momentos Marcantes</h2>
      ${S.timeline.filter(t=>t.foto).map(t=>`
        <div style="margin-top:14px">
          <img src="${t.foto}" style="width:100%;border-radius:10px">
          <div style="font-weight:700;margin-top:6px;color:#6d28d9">${esc(t.titulo)}</div>
          <div style="font-size:12px;color:#998">${dataBonita(t.data)}</div>
          ${t.desc?`<div style="font-size:14px;margin-top:2px">${esc(t.desc)}</div>`:""}
        </div>`).join("")}
    </div>`:""}

    ${S.timeline.length?`
    <div class="livro-pag">
      <div class="cap">Linha do Tempo</div>
      <h2>📅 Nossos Marcos</h2>
      ${S.timeline.slice().sort((a,b)=>a.data.localeCompare(b.data)).map(t=>{
        const tp=TL_TIPOS.find(x=>x.v===t.tipo)||{t:"⭐"};
        return `<div style="margin-top:10px;padding-bottom:8px;border-bottom:1px solid #eee">
          <b>${tp.t.split(" ")[0]} ${esc(t.titulo)}</b>
          <span style="float:right;font-size:12px;color:#998">${dataBonita(t.data).split(",")[0]}</span></div>`;
      }).join("")}
    </div>`:""}

    ${S.gratidao.length?`
    <div class="livro-pag">
      <div class="cap">Coração Grato</div>
      <h2>🌙 Nossas Gratidões</h2>
      ${Object.keys(gratsPorMembro).map(m=>`
        <div style="margin-top:12px"><b style="color:#ec4899">${esc(m)}</b>
          ${gratsPorMembro[m].map(g=>`<div style="margin-top:4px">• ${esc(g)}</div>`).join("")}
        </div>`).join("")}
    </div>`:""}

    ${S.diario.length?`
    <div class="livro-pag">
      <div class="cap">Reflexões</div>
      <h2>📖 Do Nosso Diário</h2>
      ${S.diario.map(e=>`<div style="margin-top:12px">
        <b style="color:#f59e0b">${esc(e.quem)}</b> <span style="font-size:12px;color:#998">${dataBonita(e.data).split(",")[0]}</span>
        <div style="margin-top:2px">${esc(e.txt)}</div></div>`).join("")}
    </div>`:""}

    <div class="livro-pag">
      <div class="cap">Troféus</div>
      <h2>🌟 Nossas Conquistas</h2>
      ${S.conquistas.length?CONQUISTAS.filter(c=>S.conquistas.includes(c.id)).map(c=>`
        <div style="margin-top:10px;font-size:16px">${c.emoji} <b>${c.nome}</b></div>`).join(""):'<p style="margin-top:10px">A jornada está só começando. 💪</p>'}
      <p style="margin-top:30px;text-align:center;font-style:italic;color:#6d28d9">Com amor,<br>Família ${esc(S.familia)} ❤️</p>
    </div>
  `;
  app.classList.add("hidden");
  livro.classList.remove("hidden");
  window.scrollTo(0,0);
  // auto-gera retrospectiva por IA na 1ª vez, se houver chave
  if((S.geminiKey||"").trim() && !S.retroTexto)reescreverRetro();
}
function fecharLivro(){
  document.getElementById("livro").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

/* ============ NAVEGAÇÃO ============ */
document.querySelectorAll(".nav button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    const tab=b.dataset.tab;
    ["hoje","diario","timeline","ia","mais"].forEach(t=>
      document.getElementById("tab-"+t).classList.toggle("hidden",t!==tab));
    if(tab==="diario")renderDiario();
    if(tab==="timeline")renderTimeline();
    if(tab==="ia")renderIA();
    if(tab==="mais")renderMais();
    window.scrollTo(0,0);
  };
});

/* ============ PWA (service worker + instalar) ============ */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("./sw.js").catch(e=>console.warn("SW falhou:",e));
  });
}
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;mostrarInstalar();
});
window.addEventListener("appinstalled",()=>{deferredPrompt=null;const b=document.getElementById("btn-instalar");if(b)b.remove();toast("App instalado! 🎉")});
function mostrarInstalar(){
  if(document.getElementById("btn-instalar"))return;
  const b=document.createElement("button");
  b.id="btn-instalar";b.className="btn-primary";
  b.textContent="📲 Instalar Aliança 365";
  b.style.cssText="position:fixed;left:50%;transform:translateX(-50%);bottom:78px;width:auto;max-width:92%;z-index:40;box-shadow:0 6px 24px rgba(91,75,214,.35)";
  b.onclick=async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;b.remove();
  };
  document.body.appendChild(b);
}

/* ============ INIT ============ */
if(S&&S.familia){
  migrar();
  document.getElementById("onb").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  registrarDia();render();
}else{
  renderOnb();
}
</script>
